name: Stock Analysis Automation

# 触发条件：北京时间15.38后运行，或手动触发
on:
  schedule:
    # UTC 07:18 = 北京时间 15:18 (周一至周五)
    - cron: '06 08 * * 1-5'
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  trade_eye_job:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v3

      - name: 2. 安装 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装必要依赖库
        run: |
          python -m pip install --upgrade pip
          # 必须加上 python-dotenv，否则你的 config.py 会报错
          pip install requests tushare python-dotenv PyYAML

      - name: 4. 执行分析脚本
        env:
          # 确保你在 GitHub Repo -> Settings -> Secrets -> Actions 里设置了这些变量
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python main.py
