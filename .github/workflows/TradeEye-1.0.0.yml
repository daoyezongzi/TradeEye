name: Stock-Bot-Schedule

on:
  schedule:
    # 每天北京时间 15:15 运行 (国际标准时间 07:15)
    - cron: '15 7 * * 1-5'
  workflow_dispatch: # 保留这个，方便你随时手动点击测试

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          # 这里会去你设置好的 Secrets 里取 Key
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
        run: python main.py
